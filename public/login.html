<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — AffiliateAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f0d;--bg2:#111a15;--surface:#1a2b21;
  --border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);
  --green:#34d399;--green2:#10b981;--green3:#059669;
  --text:#e8f5ef;--text2:#8faa9a;--text3:#4d6b58;
  --font:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:400px;max-width:95vw;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
.logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green2),var(--green3));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff;}
.logo-name{font-size:18px;font-weight:600;letter-spacing:-0.3px;}
h2{font-size:22px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px;text-align:center;}
.sub{font-size:14px;color:var(--text2);margin-bottom:28px;text-align:center;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:11px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border 0.15s;}
.form-input:focus{border-color:var(--green);}
.btn{width:100%;padding:12px;border-radius:9px;background:var(--green3);color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background 0.15s;margin-top:6px;}
.btn:hover{background:var(--green2);}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text2);}
.footer-link a{color:var(--green);text-decoration:none;}
.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:14px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">A</div>
    <div class="logo-name">AffiliateAI</div>
  </div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your account</p>
  <div class="error" id="error-msg">Invalid email or password. Please try again.</div>
  <div class="form-group">
    <label class="form-label">Email address</label>
    <input class="form-input" type="email" id="email" placeholder="you@company.com" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" onclick="login()">Sign in →</button>
  <div class="footer-link" style="margin-top:14px"><a href="#">Forgot password?</a></div>
  <div class="divider">or</div>
  <div class="footer-link">Don't have an account? <a href="index.html">Start free trial</a></div>
</div>
<script>
function login() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const err = document.getElementById('error-msg');
  if (!email || !pass) { err.style.display='block'; err.textContent='Please enter your email and password.'; return; }
  // In production this hits your backend auth endpoint
  // For demo: any login works
  err.style.display='none';
  const btn = document.querySelector('.btn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
}
</script>
</body>
</html>
