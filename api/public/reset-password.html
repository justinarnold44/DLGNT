<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — DLGNT.ai</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--bg2:#111a15;--surface:#1a2b21;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);--green:#34d399;--green2:#10b981;--green3:#059669;--text:#e8f5ef;--text2:#8faa9a;--text3:#4d6b58;--red:#f87171;--font:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px 28px;width:100%;max-width:380px;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:28px;justify-content:center;}
.lm{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--green2),var(--green3));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;}
.ln{font-size:18px;font-weight:700;}.ln span{color:var(--green);}
h2{font-size:20px;font-weight:700;text-align:center;margin-bottom:5px;}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px;text-align:center;}
.fg{margin-bottom:13px;}
.fl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em;}
.fi{width:100%;padding:11px 13px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border 0.15s;}
.fi:focus{border-color:var(--green);}
.btn{width:100%;padding:12px;border-radius:9px;background:var(--green3);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background 0.15s;}
.btn:hover{background:var(--green2);}
.btn:disabled{opacity:0.6;pointer-events:none;}
.msg{border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:13px;display:none;line-height:1.5;}
.msg.err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red);}
.msg.ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:var(--green);}
.msg.show{display:block;}
.back{text-align:center;margin-top:16px;font-size:13px;color:var(--text2);}
.back a{color:var(--green);}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="lm">D</div><div class="ln">DLGNT<span>.ai</span></div></div>
  <h2>Set new password</h2>
  <p class="sub">Enter your new password below</p>
  <div class="msg err" id="err"></div>
  <div class="msg ok" id="ok"></div>
  <div class="fg">
    <label class="fl">New password</label>
    <input class="fi" type="password" id="pw1" placeholder="Min 8 characters">
  </div>
  <div class="fg">
    <label class="fl">Confirm password</label>
    <input class="fi" type="password" id="pw2" placeholder="Repeat password">
  </div>
  <button class="btn" id="btn" onclick="reset()">Update password →</button>
  <div class="back"><a href="login.html">← Back to sign in</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient('https://suqghqjepnzrbzgnpjtw.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1cWdocWplcG56cmJ6Z25wanR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTYwOTcsImV4cCI6MjA4OTk3MjA5N30.HDo4uEJxKz1i1PgORark1qqA4PhWcpt7paKxYI59src');
async function reset(){
  const p1=document.getElementById('pw1').value;
  const p2=document.getElementById('pw2').value;
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  if(!p1||p1.length<8){err.textContent='Password must be at least 8 characters.';err.classList.add('show');return;}
  if(p1!==p2){err.textContent='Passwords do not match.';err.classList.add('show');return;}
  const btn=document.getElementById('btn');
  btn.textContent='Updating...';btn.disabled=true;
  const {error}=await sb.auth.updateUser({password:p1});
  if(error){err.textContent=error.message;err.classList.add('show');btn.textContent='Update password →';btn.disabled=false;}
  else{ok.textContent='Password updated! Redirecting...';ok.classList.add('show');setTimeout(()=>window.location.href='dashboard.html',1500);}
}
</script>
</body>
</html>
