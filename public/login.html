<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign in — DLGNT.ai</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--bg2:#111a15;--surface:#1a2b21;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);--green:#34d399;--green2:#10b981;--green3:#059669;--text:#e8f5ef;--text2:#8faa9a;--text3:#4d6b58;--red:#f87171;--font:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px 28px;width:100%;max-width:380px;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:28px;justify-content:center;}
.lm{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--green2),var(--green3));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;}
.ln{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
.ln span{color:var(--green);}
h2{font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:5px;text-align:center;}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px;text-align:center;}
.fg{margin-bottom:13px;}
.fl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em;}
.fi{width:100%;padding:11px 13px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border 0.15s;}
.fi:focus{border-color:var(--green);}
.pw-wrap{position:relative;}
.pw-wrap .fi{padding-right:42px;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px;}
.btn{width:100%;padding:12px;border-radius:9px;background:var(--green3);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background 0.15s;margin-top:4px;}
.btn:hover{background:var(--green2);}
.btn:disabled{opacity:0.6;pointer-events:none;}
.err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:13px;display:none;line-height:1.5;}
.err.show{display:block;}
.ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--green);margin-bottom:13px;display:none;line-height:1.5;}
.ok.show{display:block;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.links{text-align:center;font-size:13px;color:var(--text2);}
.links a{color:var(--green);}
.forgot{display:block;text-align:right;font-size:12px;color:var(--text3);margin-top:5px;cursor:pointer;}
.forgot:hover{color:var(--green);}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="lm">D</div><div class="ln">DLGNT<span>.ai</span></div></div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your account</p>
  <div class="err" id="err"></div>
  <div class="ok" id="ok"></div>
  <div class="fg">
    <label class="fl">Email address</label>
    <input class="fi" type="email" id="email" placeholder="you@company.com" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="fg">
    <label class="fl">Password</label>
    <div class="pw-wrap">
      <input class="fi" type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      <button class="pw-toggle" onclick="togglePw()" type="button">👁</button>
    </div>
    <span class="forgot" onclick="forgot()">Forgot password?</span>
  </div>
  <button class="btn" id="btn" onclick="login()">Sign in →</button>
  <div class="divider">or</div>
  <div class="links">No account? <a href="index.html#pricing">Start free trial</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb;
(async()=>{
  const cfg = await fetch('/api/config').then(r=>r.json());
  sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  const {data} = await sb.auth.getSession();
  if(data.session) window.location.href='dashboard.html';
})();

function err(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');document.getElementById('ok').classList.remove('show');}
function ok(m){const e=document.getElementById('ok');e.textContent=m;e.classList.add('show');document.getElementById('err').classList.remove('show');}

async function login(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  if(!email||!pw){err('Please enter your email and password.');return;}
  const btn=document.getElementById('btn');
  btn.textContent='Signing in...';btn.disabled=true;
  document.getElementById('err').classList.remove('show');
  const {error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err(error.message.includes('Invalid')?'Incorrect email or password.':error.message);btn.textContent='Sign in →';btn.disabled=false;return;}
  window.location.href='dashboard.html';
}

async function forgot(){
  const email=document.getElementById('email').value.trim();
  if(!email){err('Enter your email address first.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/reset-password.html'});
  if(error){err(error.message);}else{ok('Password reset email sent! Check your inbox.');}
}

function togglePw(){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';}
</script>
</body>
</html>
